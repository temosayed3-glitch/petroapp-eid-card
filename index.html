<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بطاقة تهنئة</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .card {
      position: relative;
      width: 400px;
    }

    .card img {
      width: 100%;
      border-radius: 20px;
    }

    .name-on-card {
      position: absolute;
      right: 70px;
      bottom: 220px;
      width: 260px;
      text-align: right;
      font-size: 26px;
      font-weight: 700;
      color: #1a69e4;
      direction: rtl;
      white-space: nowrap;
    }

    .form {
      width: 350px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #1a69e4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <img src="card-template.jpg" />
    <div class="name-on-card" id="cardName">
      تميم سيد
    </div>
  </div>

  <div class="form">
    <h2>اكتب اسمك</h2>
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا"/>
    <button onclick="updateName()">تحديث الاسم</button>
  </div>

</div>

<script>
  function updateName() {
    const name = document.getElementById("nameInput").value;
    document.getElementById("cardName").innerText = name;
  }
</script>

</body>
</html>
