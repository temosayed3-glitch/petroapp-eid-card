<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تهنئة العيد من PetroApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family: 'IBM Plex Sans Arabic', sans-serif; background:#eef3fb; }
    .card-wrap{ position:relative; width:100%; max-width:590px; margin:auto; }
    .card-wrap img{ width:100%; display:block; border-radius:18px; }
    .name-on-card{
      position:absolute;
      right:5.7%;
      top:30%; /* تم ضبط المكان حسب التصميم الجديد */
      width:32.2%;
      height:5%;
      padding-right:14px;
      color:#1a69e4;
      font-weight:700;
      font-size:clamp(16px, 1.7vw, 28px);
      line-height:1;
      text-align:right;
      white-space:nowrap;
      overflow:hidden;
    }
  </style>
</head>
<body>
  <div class="card-wrap" id="cardWrap">
    <img id="cardImage" src="PetroApp_Eid_Updated_Index.png" alt="بطاقة العيد">
    <div class="name-on-card" id="cardName">اكتب اسمك هنا</div>
  </div>

  <input id="nameInput" type="text" placeholder="اكتب اسمك هنا" value="" maxlength="24">
  <button id="generateBtn">إنشاء البطاقة</button>
  <button id="downloadBtn">تحميل البطاقة</button>

  <canvas id="exportCanvas"></canvas>

  <script>
    const input = document.getElementById('nameInput');
    const cardName = document.getElementById('cardName');
    const cardImage = document.getElementById('cardImage');
    const canvas = document.getElementById('exportCanvas');
    const ctx = canvas.getContext('2d');

    const NAME_BOX = {
      rightPercent: 5.7,
      topPercent: 30, // مطابق للتصميم الجديد
      widthPercent: 32.2,
      heightPercent: 5,
      paddingRight: 18,
      color: '#1a69e4',
      fontSize: 120
    };

    function sanitizeName(value){ return (value||'').replace(/\s+/g,' ').trim().slice(0,24); }

    function updatePreview(){
      const name = sanitizeName(input.value);
      cardName.textContent = name || 'اكتب اسمك هنا';
    }

    function fitFontSize(text, maxWidth, startSize){
      let size = startSize;
      while(size > 34){
        ctx.font = `700 ${size}px 'IBM Plex Sans Arabic', Arial, sans-serif`;
        if(ctx.measureText(text).width <= maxWidth) return size;
        size -= 1;
      }
      return size;
    }

    async function drawCard(){
      const img = new Image();
      img.crossOrigin='anonymous';
      img.src = cardImage.src;

      await new Promise((resolve,reject)=>{ img.onload=resolve; img.onerror=reject; });

      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);

      const entered = sanitizeName(input.value);
      if(!entered) return;

      const boxWidth = img.naturalWidth * (NAME_BOX.widthPercent/100);
      const boxHeight = img.naturalHeight * (NAME_BOX.heightPercent/100);
      const boxX = img.naturalWidth - (img.naturalWidth*(NAME_BOX.rightPercent/100)) - boxWidth;
      const boxY = img.naturalHeight * (NAME_BOX.topPercent/100);

      const rightX = boxX + boxWidth - NAME_BOX.paddingRight;
      const centerY = boxY + (boxHeight/2);
      const size = fitFontSize(entered, boxWidth-24, NAME_BOX.fontSize);

      ctx.save();
      ctx.fillStyle = NAME_BOX.color;
      ctx.direction='rtl';
      ctx.textAlign='right';
      ctx.textBaseline='middle';
      ctx.font = `700 ${size}px 'IBM Plex Sans Arabic', Arial, sans-serif`;
      ctx.fillText(entered, rightX, centerY);
      ctx.restore();
    }

    async function downloadCard(){
      await drawCard();
      const link = document.createElement('a');
      link.download='petroapp-eid-card.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    document.getElementById('generateBtn').addEventListener('click', updatePreview);
    document.getElementById('downloadBtn').addEventListener('click', downloadCard);
    input.addEventListener('input', updatePreview);
    updatePreview();
  </script>
</body>
</html>
