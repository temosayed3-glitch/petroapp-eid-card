<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetroApp Eid Card</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'IBM Plex Sans Arabic', sans-serif;
  background:#eef3fb;
}

/* layout */
.container{
  display:flex;
  gap:20px;
  align-items:center;
  justify-content:center;
  height:100vh;
  transform:scale(0.9);
}

/* card */
.card{
  position:relative;
  width:420px;
}

.card img{
  width:100%;
  border-radius:20px;
}

/* ✅ الاسم */
.name{
  position:absolute;
  right:8%;
  top:38%;
  width:30%;
  text-align:right;

  font-size:22px;
  font-weight:700;
  color:#1a69e4;

  direction:rtl;
  white-space:nowrap;
  overflow:hidden;
}

/* form */
.form{
  width:350px;
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

p{
  font-size:16px;
  color:#777;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  margin-top:10px;
  text-align:right;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#1a69e4;
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- المحتوى (يمين) -->
  <div class="form">
    <h1>عيدكم مبارك</h1>
    <p>في العيد التفاصيل الصغيرة تصنع الذكرى</p>

    <input id="inputName" placeholder="اكتب اسمك هنا">
    <button onclick="updateName()">إنشاء البطاقة</button>
  </div>

  <!-- الكارت (شمال) -->
  <div class="card">
    <img src="card-template.jpg">
    <div class="name" id="cardName">اكتب اسمك هنا</div>
  </div>

</div>

<script>
function updateName(){
  let val = document.getElementById("inputName").value.trim();
  document.getElementById("cardName").innerText = val || "اكتب اسمك هنا";
}
</script>

</body>
</html>
